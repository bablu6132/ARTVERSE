<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Product - ArtVerse</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="brand">
      <div class="brand-mark">AV</div>
      <div class="brand-text">
        <span class="brand-title">ArtVerse</span>
        <span class="brand-tagline">Curated Art Market</span>
      </div>
    </div>
    <nav class="nav-links">
      <a href="home.html">Home</a>
      <a href="cart.html">Cart</a>
      <a href="add_product.html">Add Product</a>
      <a href="admin.html">Admin</a>
      <a href="#" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <div class="container">
    <div class="page-header">
      <div>
        <span class="eyebrow">Curate</span>
        <h2>List New Artwork</h2>
        <p>Add fresh pieces to the catalog with pricing and stock.</p>
      </div>
    </div>
    <div class="form-card">
      <form id="addProductForm">
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" name="product_name" required />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea name="description" rows="3" required></textarea>
        </div>
        <div class="form-group">
          <label>Price</label>
          <input type="number" step="0.01" name="price" required />
        </div>
        <div class="form-group">
          <label>Stock Quantity</label>
          <input type="number" name="stock_quantity" required />
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" name="category" required />
        </div>
        <button type="submit">Add Product</button>
      </form>
      <div id="addProductMessage" class="message"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
